<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Quiz Game Gabriel Mota</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>QUIZ GAME</h1>

    <div id="game-container">

        <h2 id="equipe-atual">
            Equipe Atual
        </h2>

        <h3 id="categoria">
            Categoria
        </h3>

        <h3 id="dificuldade">
            Dificuldade
        </h3>

        <div id="pergunta">

        </div>

        <input
            type="text"
            id="resposta-input"
            placeholder="Digite sua resposta"
        >

        <button id="btn-responder">
            Responder
        </button>

        <div id="resultado">

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/game.js"></script>

</body>

</html>
