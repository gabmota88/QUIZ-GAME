<!DOCTYPE html>

<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        QUIZ GAME
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- TÍTULO -->
    <!-- ========================= -->

    <h1>
        QUIZ GAME
    </h1>


    <!-- ========================= -->
    <!-- CADASTRAR EQUIPE -->
    <!-- ========================= -->

    <section id="cadastro-equipe">

        <h2>
            Cadastrar Equipe
        </h2>

        <input
            type="text"
            id="nome-equipe"
            placeholder="Nome da equipe"
        >

        <select id="cor-equipe">

            <option value="vermelho">
                Vermelho
            </option>

            <option value="azul">
                Azul
            </option>

            <option value="verde">
                Verde
            </option>

            <option value="amarelo">
                Amarelo
            </option>

            <option value="roxo">
                Roxo
            </option>

            <option value="laranja">
                Laranja
            </option>

            <option value="preto">
                Preto
            </option>

            <option value="branco">
                Branco
            </option>

            <option value="rosa">
                Rosa
            </option>

            <option value="ciano">
                Ciano
            </option>

        </select>

        <button id="btn-salvar-equipe">

            Salvar Equipe

        </button>

    <h3>Pontos para vencer</h3>

<input
    type="number"
    id="pontos-vitoria"
    value="10"
    min="1"
/>          

    </section>


    <!-- ========================= -->
    <!-- LISTA DE EQUIPES -->
    <!-- ========================= -->

    <section id="equipes-container">

        <h2>
            Equipes
        </h2>

        <ul id="lista-equipes">

        </ul>

    </section>


    <!-- ========================= -->
    <!-- CONTROLE DA PARTIDA -->
    <!-- ========================= -->

    <section id="controle-jogo">

        <button id="btn-iniciar-partida">

            Iniciar Partida

        </button>

        <button id="btn-sortear">

            Sortear Ordem

        </button>

        <button id="btn-zerar-placar">
            Zerar Placar
         </button>

    </section>


    <!-- ========================= -->
    <!-- GAMEPLAY -->
    <!-- ========================= -->

    <section id="game-container">

        <h2 id="equipe-atual">

            Nenhuma equipe selecionada

        </h2>


        <!-- ========================= -->
        <!-- DIFICULDADE -->
        <!-- ========================= -->

        <div id="dificuldade-container">

            <label for="dificuldade-select">

                Escolha a dificuldade:

            </label>

            <select id="dificuldade-select">

                <option value="facil">

                    Fácil

                </option>

                <option value="medio">

                    Médio

                </option>

                <option value="dificil">

                    Difícil

                </option>

            </select>

            <button id="btn-buscar-pergunta">

                Buscar Pergunta

            </button>

        </div>


        <!-- ========================= -->
        <!-- CATEGORIA -->
        <!-- ========================= -->

        <h3 id="categoria">

        </h3>


        <!-- ========================= -->
        <!-- PERGUNTA -->
        <!-- ========================= -->

        <div id="pergunta">

        </div>


        <!-- ========================= -->
        <!-- RESPOSTA -->
        <!-- ========================= -->

        <div id="resposta-container">

            <input
                type="text"
                id="resposta-input"
                placeholder="Digite sua resposta"
            >

            <button id="btn-responder">

                Responder

            </button>

        </div>

    </section>


    <!-- ========================= -->
    <!-- PLACAR -->
    <!-- ========================= -->

    <section id="placar-container">

        <h2>
            PLACAR
        </h2>

        <ul id="lista-placar">

        </ul>

    </section>


    <!-- ========================= -->
    <!-- SCRIPTS -->
    <!-- ========================= -->

    <script src="js/api.js"></script>

    <script src="js/game.js"></script>

</body>

</html>
